<header class="mus-nav mus-nav--hamburger mus-nav--sticky" data-nav-root>
  <div class="mus-nav__inner">
    <a class="mus-nav__brand" href="/">
      <img class="mus-nav__logo" src="/Images/Musifer_Logo.svg" alt="Musifer logo">
      <span class="mus-nav__wordmark">{{ nav.site.title | upper }}</span>
    </a>

    <button
      class="mus-nav__toggle"
      type="button"
      aria-expanded="false"
      aria-controls="mus-nav-menu-hamburger"
      data-nav-toggle
    >
      <span class="mus-nav__sr-only">Toggle navigation</span>
      <span class="mus-nav__bar"></span>
      <span class="mus-nav__bar"></span>
      <span class="mus-nav__bar"></span>
    </button>

    <nav id="mus-nav-menu-hamburger" class="mus-nav__menu" aria-label="Primary" data-nav-menu>
      {% for item in nav.navigation %}
      <a href="{{ item.url }}">{{ item.title }}</a>
      {% if item.children %}
      {% for child in item.children %}
      <a href="{{ child.url }}">{{ child.title }}</a>
      {% endfor %}
      {% endif %}
      {% endfor %}
    </nav>
  </div>
</header>
