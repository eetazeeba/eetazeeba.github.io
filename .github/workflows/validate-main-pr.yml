name: Validate Main PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-main-pr:
    name: validate-main-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate CMS content
        run: npm run cms:validate
