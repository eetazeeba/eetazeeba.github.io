## Feedback ID
`FB-###`

## Title
Short, specific summary of the issue.

## Status
`NEW` | `TRIAGED` | `PLANNED` | `IN PROGRESS` | `BLOCKED` | `DONE` | `WON'T FIX`

## Priority
- `P0` Critical or blocking issues requiring immediate attention
- `P1` High-impact issues likely to affect many users or break important functionality
- `P2` Meaningful issues affecting a narrower set of users, routes, or workflows
- `P3` Polish issues with noticeable UX, visual, or content impact
- `P4` Suggestions, minor refinements, or non-issue observations worth tracking

## Area / Surface
Specific feature, pattern, or interface area affected by the issue.  
Examples: blog card carousel, primary navigation, impact cards, footer CTA, homepage hero.

## Affected Route(s) or Component(s) _(optional)_
If known, list the page route, template, partial, stylesheet, script, or component involved.

**Examples**
- `/blog/`
- `src/blog/index.njk`
- `src/_includes/header.html`
- `src/_assets/CSS/_nav.scss`

## Problem Statement
Describe the issue as currently experienced on the site or in the feature.  
State what is happening, not how to fix it.

## Reproduction / Trigger Conditions _(optional)_
List the conditions under which the issue appears.

**Examples**
1. Visit `/blog/` on desktop at ~1280px width
2. Hover the first featured card
3. Observe metadata alignment shift

## User Impact
Describe who is affected and why it matters.

**Examples**
- Causes confusion in navigation
- Reduces readability and scan quality
- Creates accessibility friction for keyboard users
- Makes the page feel visually unfinished

## Likely Root Area _(optional)_
Best-guess source of the issue, if known.

**Examples**
- markup / template structure
- CSS layout
- responsive behavior
- interaction script
- content model
- navigation data
- metadata / SEO handling

## Proposed Direction _(optional)_
Record the likely fix direction or design intent without requiring a full implementation plan.

## Acceptance Criteria
Define what must be true for the issue to count as resolved.

**Examples**
- Metadata remains aligned across target breakpoints
- Keyboard tab order remains logical
- No duplicate homepage link remains in the header
- No regression to existing card spacing or hover behavior

## Evidence / References _(optional)_
List screenshots, recordings, notes, or linked discussion relevant to the issue.

**Examples**
- `docs/issues/screenshots/FB-003-blog-grid-gap-desktop.png`
- Designer feedback dated 2026-04-07
- Accessibility pass notes

## Files Likely Impacted _(optional)_
List likely implementation targets if already known.

## Notes / Constraints _(optional)_
Capture guardrails, known limitations, or “do not break this while fixing that” concerns.

## Completion Notes _(for resolved items)_
Brief note on what changed, where, and anything still deferred.
